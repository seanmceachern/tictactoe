<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1 class="title">Tic Tac Toe</h1>

    <div class="scoreboard">
      <div class="score-item">
        <span class="score-label x-color">You (X)</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <div class="score-item">
        <span class="score-label draw-color">Draws</span>
        <span class="score-value" id="score-draws">0</span>
      </div>
      <div class="score-item">
        <span class="score-label o-color">CPU (O)</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </div>

    <div class="status-bar">
      <p class="status" id="status">Your turn</p>
    </div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <button class="reset-btn" id="reset-btn">New Game</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
